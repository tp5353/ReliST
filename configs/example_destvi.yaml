dataset:
  ready_dir: data/example/ready
  visium_h5ad: data/example/ready/spatial.h5ad
  snrna_h5ad: data/example/ready/reference.h5ad
  reference_celltype_column: cell_type
preprocessing:
  use_hvg_only: true
  max_genes: 1000
model:
  name: destvi
  layer: counts
  reference_batch_key: batch
  visium_batch_key: sample_id
  accelerator: auto
  device: auto
  posterior_batch_size: 1024
  condscvi_n_hidden: 128
  condscvi_n_latent: 5
  condscvi_n_layers: 2
  condscvi_dropout_rate: 0.05
  condscvi_prior: normal
  condscvi_max_epochs: 20
  condscvi_batch_size: 2048
  condscvi_lr: 0.001
  destvi_amortization: latent
  destvi_n_latent_amortization: 32
  destvi_prior_mode: normal
  destvi_vamp_prior_p: 15
  destvi_n_states_per_label: 3
  destvi_max_epochs: 50
  destvi_batch_size: 1024
  destvi_lr: 0.003
  destvi_n_epochs_kl_warmup: 50
  destvi_uncertainty_mode: posterior_proportions
  destvi_posterior_samples: 16
risk:
  neighbor_k: 8
  normalization_scope: sample
  missing_uncertainty_policy: zero
  confidence_proxy_uncertainty_weight: 0.7
  dual_axis_structure_weights:
    phi_local: 3
    phi_uncertainty: 1
    phi_stability: 0
    phi_reference: 0
  dual_axis_reference_weights:
    phi_local: 0
    phi_uncertainty: 2
    phi_stability: 1
    phi_reference: 2
  reference_feature_mode: marker_subset_discordance_mean
  reference_feature_marker_top_k: 25
  reference_feature_min_positive_markers: 10
  reference_feature_marker_subset: odd
  reference_feature_subsampling_repeats: 8
  reference_feature_subsampling_fraction: 0.5
  reference_feature_subsampling_random_state: 0
  stability_mode: none
  stability_repeats: 0
  stability_gene_fraction: 0.8
  stability_ridge_lambda: 0.001
  stability_random_state: 0
  stability_spatial_max_epochs: 60
  stability_spatial_batch_size: 1024
  stability_posterior_samples: 50
  high_risk_quantile: 0.9
outputs:
  results_dir: results/example_destvi
  run_id: example-destvi
